<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shashank Singh | Resume</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            background:#f5f5f5;
        }

        header{
            height:60px;
            background:#111827;
            color:#fff;
            display:flex;

        .btn:hover{

        iframe{

        }

<header>
    <h1>Shashank Singh | Resume</h1>

    <a href="shashank_resume_july.pdf" class="btn" download>
