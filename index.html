<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shashank Singh | Resume</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         Helvetica, Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            height: 60px;
            background: #1f2937;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .download-btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .download-btn:hover {
            background: #1d4ed8;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            background: white;
        }
    </style>
</head>

<body>

<header>
    <h1>Shashank Singh | Resume</h1>

    <a class="download-btn" href="shashank_resume_july.pdf" download>
        Download PDF
    </a>
</header>

<iframe
    src="Resume.pdf"
    title="Resume">
</iframe>

</body>
</html>
